
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>BA Workbench</title></head><body><style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

#ba-app, #ba-app * { box-sizing: border-box; }
#ba-app {
  --bg: #F5F6F8;
  --surface: #FFFFFF;
  --surface-alt: #EEF1F5;
  --border: #E1E5EA;
  --ink: #16202B;
  --ink-soft: #5B6675;
  --ink-faint: #8A93A0;
  --navy: #1F3B57;
  --navy-deep: #142A3F;
  --teal: #0F766E;
  --amber: #B45309;
  --red: #B91C1C;
  --green-soft: #DCEEE6;
  --green-ink: #0F5132;
  --red-soft: #FBE1DE;
  --amber-soft: #FCEBD3;
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  font-family: var(--font-body);
  color: var(--ink);
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  font-size: 13.5px;
  line-height: 1.45;
}

#ba-app .sidebar {
  width: 208px;
  flex-shrink: 0;
  background: var(--navy-deep);
  color: #DCE4EC;
  padding: 20px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
#ba-app .brand-logo {
  background: #fff;
  border-radius: 8px;
  padding: 8px 10px;
  margin: 0 8px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#ba-app .brand-logo img {
  width: 100%;
  height: auto;
  display: block;
}
#ba-app .brand {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  color: #fff;
  padding: 0 8px 18px 8px;
  letter-spacing: 0.01em;
  line-height: 1.25;
}
#ba-app .brand small {
  display: block;
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 10.5px;
  color: #8FA3B8;
  margin-top: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
#ba-app .navbtn {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 13px;
  color: #B7C4D3;
  background: transparent;
  border: none;
  text-align: left;
  padding: 9px 10px;
  border-radius: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 9px;
  transition: background .12s, color .12s;
}
#ba-app .navbtn:hover { background: rgba(255,255,255,0.06); color: #fff; }
#ba-app .navbtn.active { background: var(--teal); color: #fff; }
#ba-app .navdot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .6; flex-shrink:0; }
#ba-app .sprint-badge {
  background: rgba(15,118,110,0.18);
  border: 1px solid rgba(15,118,110,0.4);
  border-radius: 8px;
  padding: 8px 10px;
  margin: 0 8px 14px 8px;
}
#ba-app .sprint-badge .sprint-title {
  font-family: var(--font-display); font-weight: 700; font-size: 12.5px; color: #fff;
  display: flex; align-items: center; gap: 6px;
}
#ba-app .sprint-badge .sprint-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
#ba-app .sprint-badge .sprint-dates { font-family: var(--font-mono); font-size: 10.5px; color: #B7C4D3; margin-top: 3px; }
#ba-app .sidebar-foot {
  margin-top: auto;
  font-size: 10.5px;
  color: #6C7F93;
  padding: 10px 8px 2px 8px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

#ba-app .main { flex: 1; min-width: 0; padding: 26px 34px 50px 34px; }
#ba-app .pagehead { margin-bottom: 22px; }
#ba-app .pagehead h1 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  margin: 0 0 4px 0;
  color: var(--navy-deep);
}
#ba-app .pagehead p { margin: 0; color: var(--ink-soft); font-size: 13px; max-width: 640px; }

#ba-app .statrow { display: flex; gap: 12px; margin: 18px 0 24px 0; flex-wrap: wrap; }
#ba-app .statcard {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 16px; min-width: 128px; flex: 1;
}
#ba-app .statcard .n { font-family: var(--font-mono); font-size: 21px; font-weight: 600; color: var(--navy-deep); }
#ba-app .statcard .l { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }

#ba-app .card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; margin-bottom: 18px;
}
#ba-app .card h2 {
  font-family: var(--font-display); font-size: 14.5px; font-weight: 600; margin: 0 0 12px 0; color: var(--navy-deep);
}
#ba-app .card .sub { font-size: 11.5px; color: var(--ink-soft); margin: -8px 0 14px 0; }

#ba-app .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
#ba-app select, #ba-app input[type=text], #ba-app input[type=number], #ba-app input[type=date], #ba-app textarea {
  font-family: var(--font-body); font-size: 12.5px; color: var(--ink);
  border: 1px solid var(--border); border-radius: 7px; padding: 6px 9px; background: #fff;
}
#ba-app select:focus, #ba-app input:focus, #ba-app textarea:focus { outline: 2px solid var(--teal); outline-offset: 1px; }
#ba-app .btn {
  font-family: var(--font-body); font-weight: 600; font-size: 12.5px; cursor: pointer;
  border-radius: 7px; padding: 7px 14px; border: 1px solid transparent; transition: opacity .12s;
}
#ba-app .btn:hover { opacity: .88; }
#ba-app .btn-primary { background: var(--teal); color: #fff; }
#ba-app .btn-ghost { background: var(--surface-alt); color: var(--navy-deep); border-color: var(--border); }
#ba-app .btn-danger { background: var(--red-soft); color: var(--red); }
#ba-app .btn-sm { padding: 4px 9px; font-size: 11.5px; }

#ba-app table { width: 100%; border-collapse: collapse; font-size: 12px; }
#ba-app .tablewrap { overflow-x: auto; }
#ba-app th {
  font-family: var(--font-body); font-weight: 600; font-size: 10.5px; text-transform: uppercase;
  letter-spacing: .03em; color: var(--ink-soft); text-align: left; padding: 8px 10px;
  border-bottom: 2px solid var(--border); white-space: nowrap; background: var(--surface-alt);
  position: sticky; top: 0;
}
#ba-app th.sortable { cursor: pointer; user-select: none; }
#ba-app th.sortable:hover { color: var(--navy-deep); }
#ba-app th .sort-arrow { display:inline-block; width:9px; opacity:.55; font-size:9px; margin-left:2px; }
#ba-app th.sort-active .sort-arrow { opacity:1; color: var(--teal); }
#ba-app .csv-help { font-size: 11px; color: var(--ink-soft); margin-top: 8px; }
#ba-app .csv-help a { color: var(--teal); cursor: pointer; text-decoration: underline; }
#ba-app .csv-summary { font-size: 12.5px; line-height: 1.6; }
#ba-app .csv-summary .err { color: var(--red); }
#ba-app .navbtn .badge { margin-left: auto; background: var(--amber); color: #fff; font-family: var(--font-mono); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
#ba-app .navbtn .badge:empty { display: none; }
#ba-app .approval-card { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; background: var(--surface); }
#ba-app .approval-card .ac-top { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
#ba-app .approval-card .ac-title { font-family: var(--font-display); font-weight: 600; font-size: 13.5px; color: var(--navy-deep); }
#ba-app .approval-card .ac-meta { font-size: 11px; color: var(--ink-soft); }
#ba-app .difftable { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
#ba-app .difftable td { padding: 4px 8px; border-bottom: 1px solid var(--border); }
#ba-app .diff-old { color: var(--ink-faint); text-decoration: line-through; }
#ba-app .diff-new { color: var(--green-ink); font-weight: 600; }
#ba-app .approval-actions { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
#ba-app .approval-actions input { width: 140px; }
#ba-app .approval-actions label { font-size: 11px; color: var(--ink-soft); }
#ba-app td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
#ba-app td.wrap { white-space: normal; min-width: 160px; }
#ba-app tr:hover td { background: #FAFBFC; }
#ba-app .mono { font-family: var(--font-mono); }

#ba-app .pill {
  display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10.5px; font-weight: 600;
  font-family: var(--font-body); white-space: nowrap;
}
#ba-app .pill-p1 { background: var(--red-soft); color: var(--red); }
#ba-app .pill-p2 { background: var(--amber-soft); color: var(--amber); }
#ba-app .pill-p3 { background: var(--green-soft); color: var(--green-ink); }
#ba-app .pill-p4 { background: var(--surface-alt); color: var(--ink-soft); }
#ba-app .pill-status { background: var(--surface-alt); color: var(--ink-soft); }
#ba-app .pill-inprogress { background: #DCE9F7; color: #1D4E89; }
#ba-app .pill-blocked { background: var(--red-soft); color: var(--red); }
#ba-app .pill-atrisk { background: var(--amber-soft); color: var(--amber); }
#ba-app .pill-completed { background: var(--green-soft); color: var(--green-ink); }
#ba-app .pill-newreq { background: #F3E4D0; color: #8A4B00; }
#ba-app .pill-yes { background: var(--green-soft); color: var(--green-ink); }
#ba-app .pill-no { background: var(--red-soft); color: var(--red); }
#ba-app .pill-rank1 { background: var(--navy); color: #fff; }
#ba-app .unassigned-tag { color: var(--amber); font-weight: 600; }

#ba-app .capacitybar-wrap { width: 100%; }
#ba-app .daily-load-strip { display: flex; gap: 3px; margin-top: 10px; }
#ba-app .daily-load-cell { flex: 1; min-width: 0; text-align: center; cursor: default; }
#ba-app .daily-load-cell .bar { height: 26px; border-radius: 4px; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; background: var(--surface-alt); position: relative; }
#ba-app .daily-load-cell .bar-fill { width: 100%; border-radius: 4px 4px 0 0; }
#ba-app .daily-load-cell .lbl { font-size: 9px; color: var(--ink-faint); margin-top: 3px; font-family: var(--font-mono); }
#ba-app .daily-load-heading { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
#ba-app .daily-load-heading .lbl { font-size: 10.5px; text-transform: uppercase; letter-spacing: .03em; color: var(--ink-soft); }
#ba-app .capacitybar { position: relative; height: 10px; border-radius: 6px; background: var(--surface-alt); overflow: hidden; }
#ba-app .capacitybar .fill { position: absolute; left:0; top:0; bottom:0; border-radius: 6px 0 0 6px; }
#ba-app .capacitybar .overmark { position: absolute; right: -1px; top: -2px; bottom: -2px; width: 3px; background: var(--red); }
#ba-app .capline { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-soft); margin-top: 4px; display:flex; justify-content: space-between; }

#ba-app .bacard { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; background: var(--surface); }
#ba-app .bacard-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
#ba-app .bacard-name { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--navy-deep); }
#ba-app .bacard-nextup { font-size: 12px; color: var(--ink); margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
#ba-app .bacard-nextup .lbl { color: var(--ink-soft); font-size: 10.5px; text-transform: uppercase; letter-spacing: .03em; display:block; margin-bottom: 2px;}

#ba-app .formgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px 12px; }
#ba-app .field label { display: block; font-size: 11px; font-weight: 600; color: var(--ink-soft); margin-bottom: 4px; }
#ba-app .field select, #ba-app .field input, #ba-app .field textarea { width: 100%; }
#ba-app .field textarea { resize: vertical; min-height: 40px; }
#ba-app .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }

#ba-app .modal-backdrop {
  position: fixed; inset: 0; background: rgba(20,42,63,0.45); display: flex; align-items: center;
  justify-content: center; z-index: 50; padding: 20px;
}
#ba-app .modal {
  background: #fff; border-radius: 14px; padding: 22px 24px; width: 100%; max-width: 640px; max-height: 88vh;
  overflow-y: auto; box-shadow: 0 20px 60px rgba(20,42,63,0.25);
}
#ba-app .modal h2 { font-family: var(--font-display); margin: 0 0 14px 0; font-size: 16px; color: var(--navy-deep); }

#ba-app .listrow { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
#ba-app .listrow input { flex: 1; }
#ba-app .listrow .cap-input { max-width: 88px; flex: none; }

#ba-app .empty { text-align: center; padding: 30px 10px; color: var(--ink-faint); font-size: 12.5px; }
#ba-app .legend-key { display: flex; flex-wrap: wrap; gap: 12px; font-size: 11px; color: var(--ink-soft); margin-top: 6px;}
#ba-app .legend-key span { display:inline-flex; align-items:center; gap:5px; }
#ba-app .legend-key i { width:8px; height:8px; border-radius:2px; display:inline-block; }

#ba-app .readme-section { margin-bottom: 18px; }
#ba-app .readme-section h3 { font-family: var(--font-display); font-size: 13.5px; margin: 0 0 6px 0; color: var(--navy-deep); }
#ba-app .readme-section p, #ba-app .readme-section li { font-size: 12.5px; color: var(--ink); line-height: 1.6; }
#ba-app .readme-section ol, #ba-app .readme-section ul { margin: 4px 0; padding-left: 20px; }

#ba-app .toast {
  position: fixed; bottom: 22px; right: 22px; background: var(--navy-deep); color: #fff; padding: 10px 16px;
  border-radius: 8px; font-size: 12.5px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s; pointer-events:none;
}
#ba-app .toast.show { opacity: 1; transform: translateY(0); }

#ba-app .loading-row { color: var(--ink-faint); font-size: 12.5px; padding: 20px; text-align:center; }

@media (max-width: 820px) {
  #ba-app { flex-direction: column; }
  #ba-app .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px 12px; }
  #ba-app .brand { display: none; }
  #ba-app .brand-logo { display: none; }
  #ba-app .sidebar-foot { display: none; }
  #ba-app .sprint-badge { display: none; }
  #ba-app .main { padding: 18px 16px 40px 16px; }
}
</style>

    <div class="sidebar-foot">Shared live data — everyone with this link sees the same board.</div>
  </div>
  <div class="main" id="ba-main"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
(function(){
  const root = document.getElementById('ba-main');
  const navBtns = document.querySelectorAll('#ba-app .navbtn');
  let state = null;
  let activeTab = 'tracker';
  let editingTaskId = null;
  let toastTimer = null;

  const PRIORITY_WEIGHT = { P1: 1, P2: 2, P3: 3, P4: 4 };
  const STATUS_OPTS = ['New Request','Queued','Not Started','In Progress','Blocked','At Risk','Completed'];
  const PRIORITY_OPTS = ['P1','P2','P3','P4'];

  function defaultState(){
    const pms = ['Nimish','Gaurav','Kuljeet','Rishabh','Shravani','Susheel','Mannat','Mukul','Ayush','Sparsh','Aalimah','Aryan','Aakash'];
    const baNames = ['Aakash','Aalimah','Aryan','Nitish','Divyanshi','Kshitiz','Piyush','Sarthak','Vithika','Ritik','Rohit','Saksham'];
    const bas = baNames.map(n => ({name:n, weeklyCapacity: 30}));
    const today = new Date();
    const iso = (d) => localISODate(d);
    const plusDays = (n) => { const d = new Date(); d.setDate(d.getDate()+n); return iso(d); };
    const tasks = [
      mkTask(1,'Nimish','Aakash','Claims Portal Revamp','Facilitate requirements workshop with Ops team',12,'P1','In Progress',plusDays(-2),plusDays(0),plusDays(3),'Head of Ops'),
      mkTask(2,'Nimish','Aakash','Claims Portal Revamp','Draft functional spec for document upload flow',16,'P2','Queued',plusDays(-1),plusDays(3),plusDays(8),''),
      mkTask(3,'Mukul','Aakash','Regulatory Reporting','Urgent regulator query — data lineage summary',6,'P1','New Request',plusDays(0),plusDays(0),plusDays(1),'Requested by Compliance'),
      mkTask(4,'Kuljeet','Nitish','Billing Reconciliation','Data mapping between legacy and new billing system',20,'P1','At Risk',plusDays(-5),plusDays(-1),plusDays(4),'Slipping — needs finance input'),
      mkTask(5,'Rishabh','Nitish','Billing Reconciliation','UAT test case preparation',14,'P3','Not Started',plusDays(0),plusDays(5),plusDays(12),''),
      mkTask(6,'Ayush','Nitish','Payments Gateway','Impact assessment for new PSD2 requirement',10,'P1','New Request',plusDays(0),plusDays(1),plusDays(2),'Also flagged critical by Legal'),
      mkTask(7,'Gaurav','Divyanshi','Customer Onboarding','Process mapping current vs future state',18,'P2','In Progress',plusDays(-4),plusDays(-2),plusDays(2),''),
      mkTask(8,'Susheel','Divyanshi','Internal Reporting','Backlog grooming and story writing for sprint 14',10,'P3','In Progress',plusDays(-1),plusDays(0),plusDays(6),''),
      mkTask(9,'Shravani','Kshitiz','Vendor Integration API','Blocked — awaiting vendor API credentials',8,'P1','Blocked',plusDays(-6),plusDays(-3),plusDays(5),'Vendor delay'),
      mkTask(10,'Mannat','Unassigned','New Fraud Rules Engine','Write acceptance criteria for integration test suite',15,'P4','New Request',plusDays(0),plusDays(9),plusDays(13),'Needs a BA allocated'),
    ];
    return { pms, bas, tasks, nextId: 11, approverName: 'Nimish', activityLog: [], approvalCode: '' };
  }

  function mkTask(id,pm,ba,project,task,hours,priority,status,dateRequested,targetStart,estEnd,notes,projectEDD){
    return {id,pm,ba,project,task,hours,priority,status,dateRequested,targetStart,estEnd,notes,completedDate:null,awaitingApproval:false,pendingChange:null,projectEDD:projectEDD||null};
  }

  function logActivity(taskId, taskLabel, action, by, detail){
    if (!Array.isArray(state.activityLog)) state.activityLog = [];
    state.activityLog.unshift({
      id: Date.now() + Math.random(),
      taskId, task: taskLabel || '(untitled)', action,
      by: by || '(unspecified)',
      at: new Date().toISOString(),
      detail: detail || '',
    });
    if (state.activityLog.length > 300) state.activityLog.length = 300;
  }

  function promptModal(title, message, defaultValue){
    return new Promise((resolve) => {
      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.innerHTML = `
        <div class="modal" style="max-width:380px;">
          <h2>${escapeHtml(title)}</h2>
          <p style="font-size:12.5px;color:var(--ink-soft);margin:-6px 0 10px 0;">${escapeHtml(message)}</p>
          <input type="text" id="prompt-input" value="${escapeHtml(defaultValue||'')}" style="width:100%;"/>
          <div class="modal-actions">
            <button class="btn btn-ghost" id="prompt-cancel">Cancel</button>
            <button class="btn btn-primary" id="prompt-ok">Confirm</button>
          </div>
        </div>
      `;
      document.getElementById('ba-app').appendChild(backdrop);
      const input = document.getElementById('prompt-input');
      input.focus();
      const cleanup = (val) => { backdrop.remove(); resolve(val); };
      document.getElementById('prompt-cancel').onclick = () => cleanup(null);
      document.getElementById('prompt-ok').onclick = () => cleanup(input.value.trim());
      backdrop.addEventListener('click', e => { if (e.target === backdrop) cleanup(null); });
      input.addEventListener('keydown', e => { if (e.key === 'Enter') cleanup(input.value.trim()); });
    });
  }

  // Sandboxed artifact iframes often block native confirm()/alert(), so we use our own modal instead.
  function confirmModal(message, confirmLabel){
    return new Promise((resolve) => {
      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.innerHTML = `
        <div class="modal" style="max-width:380px;">
          <h2>Please confirm</h2>
          <p style="font-size:13px;color:var(--ink);margin:-4px 0 14px 0;">${escapeHtml(message)}</p>
          <div class="modal-actions">
            <button class="btn btn-ghost" id="confirm-cancel">Cancel</button>
            <button class="btn btn-danger" id="confirm-ok">${escapeHtml(confirmLabel || 'Confirm')}</button>
          </div>
        </div>
      `;
      document.getElementById('ba-app').appendChild(backdrop);
      const cleanup = (val) => { backdrop.remove(); resolve(val); };
      document.getElementById('confirm-cancel').onclick = () => cleanup(false);
      document.getElementById('confirm-ok').onclick = () => cleanup(true);
      backdrop.addEventListener('click', e => { if (e.target === backdrop) cleanup(false); });
    });
  }

  let loadedVersion = 0;
  let loadFailed = false; // safety flag: true if we couldn't confirm what's really saved - blocks saves until a successful reload

  async function loadState(){
    try {
      const res = await fetch('/api/state');
      if (res.ok) {
        const data = await res.json();
        if (data) {
          state = data;
          if (!state.approverName) state.approverName = 'Nimish';
          if (!Array.isArray(state.tasks)) state.tasks = [];
          if (!Array.isArray(state.activityLog)) state.activityLog = [];
          if (state.approvalCode === undefined) state.approvalCode = '';
          loadedVersion = state.__version || 0;
          loadFailed = false;
          return;
        }
        state = defaultState();
        loadedVersion = 0;
        loadFailed = false;
        await saveState();
        return;
      }
      loadFailed = true;
      state = defaultState();
      showToast('Could not load the latest data from the server (error ' + res.status + '). Please refresh before making any changes - nothing has been overwritten.');
      return;
    } catch(e) {
      loadFailed = true;
      state = defaultState();
      showToast('Could not reach the server to load data. Please check your connection and refresh before making any changes - nothing has been overwritten.');
      console.error('loadState error:', e);
    }
  }

  async function saveState(){
    if (loadFailed) {
      showToast('Could not confirm the latest saved data, so nothing was saved. Please refresh the page and try again.');
      return false;
    }
    try {
      const payload = Object.assign({}, state, { __expectedVersion: loadedVersion });
      const res = await fetch('/api/state', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (res.status === 409) {
        showToast('Someone else saved changes just now. If a form is open, everything you typed is still there — just click Save again.');
        await loadState();
        render();
        return false;
      }
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || ('HTTP ' + res.status));
      }
      const result = await res.json();
      if (result && typeof result.version === 'number') loadedVersion = result.version;
      return true;
    } catch(e) {
      showToast('Could not save — check your connection or KV setup, then try again.');
      console.error('saveState error:', e);
      return false;
    }
  }

  function showToast(msg){
    let t = document.querySelector('#ba-app .toast');
    if (!t) {
      t = document.createElement('div');
      t.className = 'toast';
      document.getElementById('ba-app').appendChild(t);
    }
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> t.classList.remove('show'), 2400);
  }

  function localISODate(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  function todayISO(){ return localISODate(new Date()); }
  function daysBetween(a,b){ return Math.round((new Date(b) - new Date(a)) / 86400000); }
  function fmtDate(iso){
    if (!iso) return '—';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  }
  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  const GATED_FIELDS = ['ba','hours','priority','targetStart','estEnd'];
  const FIELD_LABELS = { ba:'Business Analyst', hours:'Est. man-hours', priority:'Priority', targetStart:'Target start date', estEnd:'Est. end date', projectEDD:'Project EDD', project:'Project', task:'Task', notes:'Notes', status:'Status' };
  function isOpenWindowDay(){
    const { end } = getPlanningWindow();
    const todayStr = todayISO();
    const endDate = new Date(end + 'T00:00:00');
    const sunAfter = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate() + 2);
    return todayStr >= end && todayStr <= localISODate(sunAfter);
  } // Fri/Sat/Sun that closes out the current fixed sprint - occurs every alternate weekend, not every week
  function needsApproval(pmName){ return !(isOpenWindowDay() || pmName === state.approverName); }
  function isDataComplete(t){
    const hoursValid = t.hours !== null && t.hours !== '' && t.hours !== undefined && Number.isFinite(Number(t.hours));
    return !!(t.priority && PRIORITY_OPTS.includes(t.priority)) && !!t.targetStart && !!t.estEnd && hoursValid;
  }
  function fmtDateTime(iso){
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  }
  function updateNavBadges(){
    const badge = document.getElementById('nav-approvals-badge');
    if (!badge) return;
    const pending = (state.tasks||[]).filter(t => t.awaitingApproval || t.pendingChange).length;
    badge.textContent = pending > 0 ? String(pending) : '';
  }

  const SPRINT_ANCHOR = '2026-07-13'; // Sprint 1 starts here (a Monday) - fixed, doesn't roll week to week

  function getPlanningWindow(){
    const today = todayISO();
    const anchor = new Date(SPRINT_ANCHOR + 'T00:00:00');
    const now = new Date(today + 'T00:00:00');
    const daysSinceAnchor = Math.round((now - anchor) / 86400000);
    const sprintIndex = Math.floor(daysSinceAnchor / 14);
    const sprintStart = new Date(anchor.getFullYear(), anchor.getMonth(), anchor.getDate() + sprintIndex * 14);
    const sprintEnd = new Date(sprintStart.getFullYear(), sprintStart.getMonth(), sprintStart.getDate() + 11);
    return { start: localISODate(sprintStart), end: localISODate(sprintEnd), sprintNumber: sprintIndex + 1 };
  }

  // ---- Derived computation, mirrors the spreadsheet logic ----
  function workingDaysBetween(start, end){
    if (!start || !end || end < start) return 0;
    let count = 0;
    const d = new Date(start + 'T00:00:00');
    const e = new Date(end + 'T00:00:00');
    while (d <= e) {
      const day = d.getDay();
      if (day !== 0 && day !== 6) count++;
      d.setDate(d.getDate() + 1);
    }
    return count;
  }

  function listWorkingDays(start, end){
    const days = [];
    if (!start || !end || end < start) return days;
    const d = new Date(start + 'T00:00:00');
    const e = new Date(end + 'T00:00:00');
    while (d <= e) {
      const day = d.getDay();
      if (day !== 0 && day !== 6) days.push(localISODate(d));
      d.setDate(d.getDate() + 1);
    }
    return days;
  }

  // Spreads each task's hours evenly across its own working days, then sums
  // by day for one BA - surfaces days that are locally choked (many tasks'
  // date ranges clustered together) even when the BA's sprint-wide total
  // looks fine.
  function computeDailyLoad(enriched, windowStart, windowEnd, baName, dailyCapacity){
    const days = listWorkingDays(windowStart, windowEnd);
    const totals = {};
    days.forEach(d => { totals[d] = 0; });

    enriched.filter(t => t.ba === baName && t.active && t.targetStart && t.estEnd).forEach(t => {
      const totalDays = workingDaysBetween(t.targetStart, t.estEnd);
      if (totalDays <= 0) return;
      const dailyRate = (Number(t.hours) || 0) / totalDays;
      days.forEach(d => {
        if (d >= t.targetStart && d <= t.estEnd) totals[d] += dailyRate;
      });
    });

    return days.map(d => {
      const load = totals[d];
      const pct = dailyCapacity > 0 ? load / dailyCapacity : 0;
      return { date: d, load: Math.round(load * 10) / 10, pct };
    });
  }

  function computeDerived(){
    const today = todayISO();
    const { start: windowStart, end: windowEnd, sprintNumber } = getPlanningWindow();

    const enriched = state.tasks.map(t => {
      const duration = (t.targetStart && t.estEnd) ? daysBetween(t.targetStart, t.estEnd) : null;
      const daysRemaining = t.estEnd ? daysBetween(today, t.estEnd) : null;
      const inWindow = (t.targetStart && t.estEnd) ? (t.targetStart <= windowEnd && t.estEnd >= windowStart) : false;
      const weight = PRIORITY_WEIGHT[t.priority] || 9;
      const open = t.status !== 'Completed';
      const dataComplete = isDataComplete(t);
      const visible = open && !t.awaitingApproval;
      const active = visible && dataComplete;

      // Only count the portion of a task's hours that actually falls within
      // THIS sprint - a task whose dates extend beyond the window shouldn't
      // consume its full hours against this sprint's capacity, only the
      // working-day share that overlaps it.
      let inSprintHours = Number(t.hours) || 0;
      if (dataComplete && t.targetStart && t.estEnd) {
        const totalDays = workingDaysBetween(t.targetStart, t.estEnd);
        if (totalDays > 0) {
          const overlapStart = t.targetStart > windowStart ? t.targetStart : windowStart;
          const overlapEnd = t.estEnd < windowEnd ? t.estEnd : windowEnd;
          const overlapDays = workingDaysBetween(overlapStart, overlapEnd);
          inSprintHours = (Number(t.hours) || 0) * overlapDays / totalDays;
        }
      }

      return Object.assign({}, t, { duration, daysRemaining, inWindow, weight, open, dataComplete, visible, active, inSprintHours });
    });

    // Hours already completed this sprint per BA - these stay "used" against
    // capacity, so completing a task doesn't shrink the cumulative total that
    // "Fits in Capacity Now?" and Cum. hrs are measured against.
    const completedHoursByBA = {};
    enriched.forEach(t => {
      if (t.status === 'Completed' && t.completedDate && t.completedDate >= windowStart) {
        completedHoursByBA[t.ba] = (completedHoursByBA[t.ba] || 0) + (Number(t.hours) || 0);
      }
    });

    // group active (approved, open) tasks by BA, sort by priority weight -> estEnd -> dateRequested -> id
    const byBA = {};
    enriched.forEach(t => { if (!t.active) return; (byBA[t.ba] = byBA[t.ba] || []).push(t); });
    Object.keys(byBA).forEach(ba => {
      byBA[ba].sort((a,b) => {
        if (a.weight !== b.weight) return a.weight - b.weight;
        const ea = a.estEnd || '9999-99-99', eb = b.estEnd || '9999-99-99';
        if (ea !== eb) return ea < eb ? -1 : 1;
        const ra = a.dateRequested || '9999-99-99', rb = b.dateRequested || '9999-99-99';
        if (ra !== rb) return ra < rb ? -1 : 1;
        return a.id - b.id;
      });
      let cum = completedHoursByBA[ba] || 0; // start from hours already used this sprint, not zero
      byBA[ba].forEach((t, idx) => {
        t.pickupOrder = idx + 1;
        cum += t.inSprintHours;
        t.cumulativeHours = cum;
      });
    });
    // map back onto enriched by id
    const rankMap = {};
    Object.values(byBA).flat().forEach(t => { rankMap[t.id] = { pickupOrder: t.pickupOrder, cumulativeHours: t.cumulativeHours }; });

    const baCapacity = {};
    state.bas.forEach(b => baCapacity[b.name] = b.weeklyCapacity * 2);

    enriched.forEach(t => {
      const r = rankMap[t.id];
      t.pickupOrder = t.active && r ? r.pickupOrder : null;
      t.cumulativeHours = t.active && r ? r.cumulativeHours : null;
      const cap = baCapacity[t.ba] || 0;
      t.fitsCapacity = t.active && r ? (r.cumulativeHours <= cap ? 'Yes' : 'No') : null;
    });

    return { enriched, windowStart, windowEnd, today, sprintNumber };
  }

  function workingDaysRemaining(windowStart, windowEnd, today){
    const start = today > windowStart ? today : windowStart;
    let count = 0;
    const d = new Date(start + 'T00:00:00');
    const end = new Date(windowEnd + 'T00:00:00');
    while (d <= end) {
      const day = d.getDay();
      if (day !== 0 && day !== 6) count++;
      d.setDate(d.getDate() + 1);
    }
    return count;
  }

  function computeBAAvailability(enriched, windowStart, windowEnd, today){
    const daysLeft = workingDaysRemaining(windowStart, windowEnd, today);
    return state.bas.map(ba => {
      const open = enriched.filter(t => t.ba === ba.name && t.active);
      const committed = open.reduce((s,t) => s + t.inSprintHours, 0);

      // Hours completed THIS sprint still count as "used" - completing a task
      // moves its hours from committed-to-open into completed-this-sprint, but
      // never removes them from the sprint's total, so Remaining never jumps.
      const completedThisSprint = enriched.filter(t =>
        t.ba === ba.name && t.status === 'Completed' && t.completedDate && t.completedDate >= windowStart);
      const completedHours = completedThisSprint.reduce((s,t) => s + (Number(t.hours)||0), 0);

      const cap2w = ba.weeklyCapacity * 2;
      const totalUsed = committed + completedHours;
      const remaining = cap2w - totalUsed; // budget-based, stable across completions
      const dailyCapacity = ba.weeklyCapacity / 5;
      const proratedCapacity = dailyCapacity * daysLeft; // what's realistically doable in days left
      const realisticRemaining = Math.min(remaining, proratedCapacity); // the tighter of the two constraints
      const util = cap2w > 0 ? totalUsed / cap2w : 0;
      const risk = open.filter(t => t.status === 'At Risk' || t.status === 'Blocked').length;
      const p1p2 = open.filter(t => t.priority === 'P1' || t.priority === 'P2').reduce((s,t)=>s+t.inSprintHours,0);
      let status = 'Available';
      if (risk > 0) status = 'Needs attention';
      else if (remaining <= 0) status = 'Overloaded';
      else if (realisticRemaining <= 0) status = 'Sprint ending'; // budget is fine, but no working days left to use it
      const nextUp = open.find(t => t.pickupOrder === 1) || null;

      // Man-days of work still open and not completed - uses each task's FULL
      // hours (not sprint-prorated), regardless of whether the task's dates
      // extend beyond this sprint, to give true backlog/efficiency visibility.
      const totalOpenHoursAllTime = open.reduce((s,t) => s + (Number(t.hours)||0), 0);
      const manDaysOpen = dailyCapacity > 0 ? totalOpenHoursAllTime / dailyCapacity : 0;

      return { name: ba.name, weeklyCapacity: ba.weeklyCapacity, cap2w, committed, completedHours, totalUsed, remaining, realisticRemaining, daysLeft, util, risk, p1p2, status, nextUp, openCount: open.length, totalOpenHoursAllTime, manDaysOpen };
    });
  }

  // ---- Rendering ----
  function render(){
    root.innerHTML = '';
    if (activeTab === 'tracker') renderTracker();
    else if (activeTab === 'availability') renderAvailability();
    else if (activeTab === 'dashboard') renderDashboard();
    else if (activeTab === 'archive') renderArchive();
    else if (activeTab === 'approvals') renderApprovals();
    else if (activeTab === 'lists') renderLists();
    else if (activeTab === 'activitylog') renderActivityLog();
    else if (activeTab === 'readme') renderReadme();
    updateNavBadges();
  }

  function pillForPriority(p){
    const cls = { P1:'pill-p1', P2:'pill-p2', P3:'pill-p3', P4:'pill-p4' }[p] || 'pill-status';
    return `<span class="pill ${cls}">${p||'—'}</span>`;
  }
  function pillForStatus(s){
    const map = { 'Completed':'pill-completed','In Progress':'pill-inprogress','Blocked':'pill-blocked',
      'At Risk':'pill-atrisk','New Request':'pill-newreq','Queued':'pill-status','Not Started':'pill-status' };
    return `<span class="pill ${map[s]||'pill-status'}">${s}</span>`;
  }

  function trackerHeaderCell(key, label){
    const s = window.__baSort;
    const active = s.key === key;
    const arrow = active ? (s.dir === 'asc' ? '▲' : '▼') : '↕';
    return `<th class="sortable${active?' sort-active':''}" data-key="${key}">${label}<span class="sort-arrow">${arrow}</span></th>`;
  }

  function getSortValue(t, key){
    return t[key];
  }

  function sortRows(rows, sortState){
    if (!sortState.key) {
      return rows.slice().sort((a,b) => {
        if (a.ba !== b.ba) return (a.ba||'').localeCompare(b.ba||'');
        if (a.pickupOrder != null && b.pickupOrder != null) return a.pickupOrder - b.pickupOrder;
        return 0;
      });
    }
    const key = sortState.key;
    const dir = sortState.dir === 'asc' ? 1 : -1;
    const numericKeys = ['hours','pickupOrder','daysRemaining','cumulativeHours'];
    const priorityKeys = ['priority'];
    return rows.slice().sort((a,b) => {
      let va = getSortValue(a,key), vb = getSortValue(b,key);
      const aEmpty = (va == null || va === '');
      const bEmpty = (vb == null || vb === '');
      if (aEmpty && bEmpty) return 0;
      if (aEmpty) return 1;
      if (bEmpty) return -1;
      if (priorityKeys.includes(key)) {
        va = PRIORITY_WEIGHT[va] || 9; vb = PRIORITY_WEIGHT[vb] || 9;
        return (va - vb) * dir;
      }
      if (numericKeys.includes(key)) {
        return (Number(va) - Number(vb)) * dir;
      }
      return String(va).localeCompare(String(vb)) * dir;
    });
  }

  function renderTracker(){
    const { enriched, windowStart, windowEnd } = computeDerived();
    const filters = window.__baFilters || { ba:'', pm:'', priority:'', status:'', sprint:'', dateFrom:'', dateTo:'', completeness:'', eddFrom:'', eddTo:'', endFrom:'', endTo:'' };
    window.__baFilters = filters;
    if (!window.__baSort) window.__baSort = { key: null, dir: 'asc' };

    let rows = enriched.filter(t => t.visible);
    if (filters.ba) rows = rows.filter(t => t.ba === filters.ba);
    if (filters.pm) rows = rows.filter(t => t.pm === filters.pm);
    if (filters.priority) rows = rows.filter(t => t.priority === filters.priority);
    if (filters.status) rows = rows.filter(t => t.status === filters.status);
    if (filters.sprint === 'in') rows = rows.filter(t => t.inWindow);
    else if (filters.sprint === 'out') rows = rows.filter(t => !t.inWindow);
    if (filters.completeness === 'incomplete') rows = rows.filter(t => !t.dataComplete);
    else if (filters.completeness === 'complete') rows = rows.filter(t => t.dataComplete);
    if (filters.dateFrom || filters.dateTo) {

        return true;
      });

  function openTaskModal(id){
    editingTaskId = id;
    const t = id ? state.tasks.find(x => x.id === id) : {
      pm: state.pms[0]||'', ba: 'Unassigned', project:'', task:'', hours:'', priority:'',
      status:'New Request', dateRequested: todayISO(), targetStart:'', estEnd:'', notes:'', projectEDD:''
    };
    const baOptions = ['Unassigned', ...state.bas.map(b=>b.name)];
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal">
        <h2>${id ? 'Edit request' : 'New work request'}</h2>
        <p style="font-size:11.5px;color:var(--ink-soft);margin:-6px 0 12px 0;">Leave Priority, dates, or Hours blank if not known yet \u2014 the request stays visible but is skipped in sequencing until they're filled in.</p>
        <div class="formgrid">
          <div class="field"><label>EM/PM name</label><select id="m-pm">${state.pms.map(p=>`<option ${p===t.pm?'selected':''}>${escapeHtml(p)}</option>`).join('')}</select></div>
          <div class="field"><label>Business Analyst</label><select id="m-ba">${baOptions.map(b=>`<option ${b===t.ba?'selected':''}>${escapeHtml(b)}</option>`).join('')}</select></div>
          <div class="field"><label>Project / initiative</label><input type="text" id="m-project" value="${escapeHtml(t.project)}"/></div>
          <div class="field"><label>Project EDD <span style="font-weight:400;color:var(--ink-soft);">(optional)</span></label><input type="date" id="m-project-edd" value="${t.projectEDD||''}"/></div>
          <div class="field"><label>Est. man-hours</label><input type="number" min="0" step="0.5" id="m-hours" placeholder="Unknown" value="${t.hours===null||t.hours===undefined?'':t.hours}"/></div>
          <div class="field"><label>Priority</label><select id="m-priority"><option value="" ${!t.priority?'selected':''}>\u2014 Unknown \u2014</option>${PRIORITY_OPTS.map(p=>`<option ${p===t.priority?'selected':''}>${p}</option>`).join('')}</select></div>
          <div class="field"><label>Request status</label><select id="m-status">${STATUS_OPTS.map(s=>`<option ${s===t.status?'selected':''}>${s}</option>`).join('')}</select></div>
          <div class="field"><label>Date requested</label><input type="date" id="m-reqdate" value="${t.dateRequested||''}"/></div>
          <div class="field"><label>Target start date</label><input type="date" id="m-start" value="${t.targetStart||''}"/></div>
          <div class="field"><label>Est. end date</label><input type="date" id="m-end" value="${t.estEnd||''}"/></div>
        </div>
        <div class="field" style="margin-top:10px;"><label>Task description</label><textarea id="m-task">${escapeHtml(t.task)}</textarea></div>
        <div class="field" style="margin-top:10px;"><label>Notes / blockers</label><textarea id="m-notes">${escapeHtml(t.notes)}</textarea></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="m-cancel">Cancel</button>
          <button class="btn btn-primary" id="m-save">${id ? 'Save changes' : 'Add request'}</button>
        </div>
      </div>
    `;
    document.getElementById('ba-app').appendChild(backdrop);
    document.getElementById('m-cancel').onclick = () => backdrop.remove();
    backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.remove(); });
    document.getElementById('m-save').onclick = async () => {
      const hoursRaw = document.getElementById('m-hours').value;
      const payload = {
        pm: document.getElementById('m-pm').value,
        ba: document.getElementById('m-ba').value,
        project: document.getElementById('m-project').value.trim(),
        projectEDD: document.getElementById('m-project-edd').value,
        task: document.getElementById('m-task').value.trim(),
        hours: hoursRaw === '' ? null : Number(hoursRaw),
        priority: document.getElementById('m-priority').value,
        status: document.getElementById('m-status').value,
        dateRequested: document.getElementById('m-reqdate').value,
        targetStart: document.getElementById('m-start').value,
        estEnd: document.getElementById('m-end').value,
        notes: document.getElementById('m-notes').value.trim(),
      };
      if (!payload.task) { showToast('Add a task description first.'); return; }
      if (payload.status === 'Completed') {
        const existing = id ? state.tasks.find(x => x.id === id) : null;
        payload.completedDate = (existing && existing.completedDate) ? existing.completedDate : todayISO();
      } else {
        payload.completedDate = null;
      }

      let toastMsg = id ? 'Request updated.' : 'Request added.';
      if (payload.completedDate && id) toastMsg = 'Request completed \u2014 moved to Archive.';

      const LOG_FIELDS = ['ba','hours','priority','targetStart','estEnd','project','projectEDD','task','notes','status'];
      const fieldDisplay = (f,v) => {
        if (f === 'priority') return v || '(blank)';
        if (f === 'targetStart' || f === 'estEnd' || f === 'projectEDD') return v ? fmtDate(v) : '(blank)';
        if (f === 'hours') return (v===null||v===''||v===undefined) ? '(blank)' : v;
        return v || '(blank)';
      };

      if (id) {
        const original = state.tasks.find(x => x.id === id);
        const gate = needsApproval(payload.pm);
        let finalPayload = Object.assign({}, payload, { awaitingApproval: false });
        let pendingChange = original.pendingChange || null;
        let heldForApproval = [];
        if (gate) {
          const changedGated = {};
          GATED_FIELDS.forEach(f => { if (String(payload[f]) !== String(original[f])) changedGated[f] = payload[f]; });
          if (Object.keys(changedGated).length) {
            GATED_FIELDS.forEach(f => { finalPayload[f] = original[f]; });
            pendingChange = Object.assign({}, changedGated, { requestedBy: payload.pm, requestedAt: new Date().toISOString() });
            toastMsg = `Saved. ${Object.keys(changedGated).map(f=>FIELD_LABELS[f]).join(', ')} change${Object.keys(changedGated).length>1?'s':''} sent to ${state.approverName} for approval.`;
            heldForApproval = Object.keys(changedGated);
          }
        }
        finalPayload.pendingChange = pendingChange;

        const statusChanged = String(finalPayload.status) !== String(original.status);
        let statusChanger = payload.pm;
        if (statusChanged) {
          statusChanger = (await promptModal('Status change', `Who is changing status to "${finalPayload.status}"? (optional)`, payload.pm)) || payload.pm;
        }

        const idx = state.tasks.findIndex(x => x.id === id);
        state.tasks[idx] = Object.assign({id}, finalPayload);

        const nonStatusFields = LOG_FIELDS.filter(f => f !== 'status');
        const appliedChanges = nonStatusFields.filter(f => !heldForApproval.includes(f) && String(finalPayload[f]) !== String(original[f]));
        if (appliedChanges.length) {
          const detail = appliedChanges.map(f => `${FIELD_LABELS[f]||f}: ${fieldDisplay(f,original[f])} \u2192 ${fieldDisplay(f,finalPayload[f])}`).join('; ');
          logActivity(id, payload.task, 'Edited', payload.pm, detail);
        }
        if (statusChanged) {
          logActivity(id, payload.task, 'Status changed', statusChanger, `${original.status} \u2192 ${finalPayload.status}`);
        }
        if (heldForApproval.length) {
          const detail = heldForApproval.map(f => `${FIELD_LABELS[f]} \u2192 ${fieldDisplay(f,pendingChange[f])} (pending)`).join('; ');
          logActivity(id, payload.task, 'Edit proposed', payload.pm, detail);
        }
      } else {
        const gate = needsApproval(payload.pm);
        const finalPayload = Object.assign({}, payload, { awaitingApproval: gate, pendingChange: null });
        const newId = state.nextId++;
        state.tasks.push(Object.assign({id: newId}, finalPayload));
        if (gate) toastMsg = `Request sent to ${state.approverName} for approval \u2014 it won't count toward capacity until approved.`;
        logActivity(newId, payload.task, gate ? 'Created (pending approval)' : 'Created', payload.pm, '');
      }
      if (!(await saveState())) return;
      backdrop.remove();
      showToast(toastMsg);
      render();
    };
  }

  // ---- CSV import ----
  const CSV_HEADERS = ['EM/PM','BA','Project','Project EDD','Task','Hours','Priority','Status','Date Requested','Target Start','Est End','Notes'];

  function downloadCsvTemplate(){
    const sampleRow1 = ['Nimish','Aakash','Sample Project',todayISO(),'Describe the task here',8,'P3','New Request',todayISO(),todayISO(),todayISO(),''];
    const sampleRow2 = ['Gaurav','','Another project','','Task with details still unknown','','','New Request',todayISO(),'','','Project EDD is optional and doesn\u2019t affect anything else \u2014 leave it blank if unknown'];
    const rowsCsv = [sampleRow1, sampleRow2].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
    const csv = [CSV_HEADERS.join(','), ...rowsCsv].join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'ba_tracker_template.csv';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  function normalizeHeaderKey(h){
    return String(h||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  }
  const HEADER_ALIAS = {
    'empm':'pm','pm':'pm','emname':'pm','pmname':'pm',
    'ba':'ba','businessanalyst':'ba',
    'project':'project','projectinitiative':'project',
    'projectedd':'projectEDD','edd':'projectEDD','expecteddeliverydate':'projectEDD','projectexpecteddeliverydate':'projectEDD',
    'task':'task','taskdescription':'task',
    'hours':'hours','estmanhours':'hours','manhours':'hours',
    'priority':'priority',
    'status':'status','requeststatus':'status',
    'daterequested':'dateRequested',
    'targetstart':'targetStart','targetstartdate':'targetStart',
    'estend':'estEnd','estenddate':'estEnd',
    'notes':'notes','notesblockers':'notes',
  };
  function parseDateLoose(v){
    if (!v) return '';
    const s = String(v).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const d = new Date(s);
    if (!isNaN(d.getTime())) return localISODate(d);
    return '';
  }

  async function handleCsvUpload(file){
    if (!file) return;
    if (typeof Papa === 'undefined') { showToast('CSV parser failed to load \u2014 check your connection and retry.'); return; }
    const text = await file.text();
    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
    const rows = parsed.data || [];
    if (!rows.length) { showToast('That CSV had no rows to import.'); return; }

    let added = 0, skipped = 0, pendingCount = 0, incompleteCount = 0;
    const skipReasons = [];
    rows.forEach((raw, i) => {
      const row = {};
      Object.keys(raw).forEach(h => {
        const norm = normalizeHeaderKey(h);
        const key = HEADER_ALIAS[norm];
        if (key) row[key] = raw[h];
      });
      const task = (row.task || '').trim();
      if (!task) { skipped++; skipReasons.push(`Row ${i+2}: missing task description`); return; }

      let pm = (row.pm || '').trim();
      if (pm && !state.pms.includes(pm)) state.pms.push(pm);
      if (!pm) pm = state.pms[0] || '';

      let ba = (row.ba || '').trim() || 'Unassigned';
      if (ba !== 'Unassigned' && !state.bas.some(b => b.name === ba)) {
        state.bas.push({ name: ba, weeklyCapacity: 30 });
      }

      // Blank hours/priority/dates stay blank \u2014 no silent defaults.
      let hours = (row.hours !== undefined && String(row.hours).trim() !== '') ? Number(row.hours) : null;
      if (hours !== null && (!Number.isFinite(hours) || hours < 0)) hours = null;

      let priority = (row.priority || '').trim().toUpperCase();
      if (!PRIORITY_OPTS.includes(priority)) priority = '';

      let status = (row.status || '').trim();
      const validStatus = STATUS_OPTS.find(s => s.toLowerCase() === status.toLowerCase());
      status = validStatus || 'New Request';

      const dateRequested = parseDateLoose(row.dateRequested);
      const targetStart = parseDateLoose(row.targetStart);
      const estEnd = parseDateLoose(row.estEnd);
      const projectEDD = parseDateLoose(row.projectEDD);
      const gate = needsApproval(pm);
      if (gate) pendingCount++;

      const newTask = {
        id: state.nextId++, pm, ba, project: (row.project||'').trim(), projectEDD, task, hours, priority, status,
        dateRequested, targetStart, estEnd, notes: (row.notes||'').trim(),
        completedDate: status === 'Completed' ? todayISO() : null,
        awaitingApproval: gate, pendingChange: null,
      };
      if (!isDataComplete(newTask)) incompleteCount++;
      state.tasks.push(newTask);
      logActivity(newTask.id, newTask.task, gate ? 'Created via CSV (pending approval)' : 'Created via CSV', pm, '');
      added++;
    });

    if (!(await saveState())) return;
    document.getElementById('csv-file-input').value = '';
    showCsvSummary(added, skipped, skipReasons, pendingCount, incompleteCount);
    render();
  }

  function showCsvSummary(added, skipped, reasons, pendingCount, incompleteCount){
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal" style="max-width:480px;">
        <h2>CSV import complete</h2>
        <div class="csv-summary">
          <p><b>${added}</b> request${added===1?'':'s'} added.${skipped ? ` <span class="err">${skipped} row${skipped===1?'':'s'} skipped.</span>` : ''}</p>
          ${incompleteCount ? `<p style="color:var(--ink-soft);">${incompleteCount} row${incompleteCount===1?'':'s'} left Priority, Target Start, Est. End, or Hours blank \u2014 left as-is, and skipped in sequencing until you fill them in on Tracker.</p>` : ''}
          ${pendingCount ? `<p style="color:var(--ink-soft);">${pendingCount} of those were imported outside the Friday–Sunday window and need ${escapeHtml(state.approverName)}'s approval before they count \u2014 check the <b>Approvals</b> tab, not Tracker, to find them.</p>` : ''}
          ${reasons.length ? `<p style="color:var(--ink-soft);font-size:11.5px;">${reasons.slice(0,8).map(escapeHtml).join('<br/>')}${reasons.length>8?'<br/>\u2026and more':''}</p>` : ''}
        </div>
        <div class="modal-actions"><button class="btn btn-primary" id="csv-ok">Done</button></div>
      </div>
    `;
    document.getElementById('ba-app').appendChild(backdrop);
    document.getElementById('csv-ok').onclick = () => backdrop.remove();
    backdrop.addEventListener('click', e => { if (e.target === backdrop) backdrop.remove(); });
  }

  // ---- Archive ----
  function renderArchive(){
    const { enriched } = computeDerived();
    const filters = window.__archiveFilters || { ba:'', pm:'' };
    window.__archiveFilters = filters;
    if (!window.__archiveSort) window.__archiveSort = { key: 'completedDate', dir: 'desc' };

    let rows = enriched.filter(t => t.status === 'Completed');
    if (filters.ba) rows = rows.filter(t => t.ba === filters.ba);
    if (filters.pm) rows = rows.filter(t => t.pm === filters.pm);

    const sortState = window.__archiveSort;
    const dir = sortState.dir === 'asc' ? 1 : -1;
    rows = rows.slice().sort((a,b) => {
      let va = a[sortState.key], vb = b[sortState.key];
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      if (sortState.key === 'hours') return (Number(va)-Number(vb))*dir;
      return String(va).localeCompare(String(vb))*dir;
    });

    const totalHours = rows.reduce((s,t)=>s+(Number(t.hours)||0),0);
    const weekAgo = (() => { const d = new Date(); d.setDate(d.getDate()-7); return localISODate(d); })();
    const completedThisWeek = rows.filter(t => t.completedDate && t.completedDate >= weekAgo).length;

    const baOptions = ['Unassigned', ...state.bas.map(b=>b.name)];

    function archiveHeader(key, label){
      const active = sortState.key === key;
      const arrow = active ? (sortState.dir==='asc'?'▲':'▼') : '↕';
      return `<th class="sortable${active?' sort-active':''}" data-key="${key}">${label}<span class="sort-arrow">${arrow}</span></th>`;
    }

    root.innerHTML = `
      <div class="pagehead">
        <h1>Archive</h1>
        <p>Completed requests, kept for history and separated from active work in Tracker.</p>
      </div>
      <div class="statrow">
        <div class="statcard"><div class="n mono">${rows.length}</div><div class="l">Archived requests</div></div>
        <div class="statcard"><div class="n mono">${totalHours}</div><div class="l">Total archived hours</div></div>
        <div class="statcard"><div class="n mono">${completedThisWeek}</div><div class="l">Completed this week</div></div>
      </div>
      <div class="card">
        <div class="filters">
          <select id="af-ba"><option value="">All BAs</option>${baOptions.map(b=>`<option ${filters.ba===b?'selected':''}>${escapeHtml(b)}</option>`).join('')}</select>
          <select id="af-pm"><option value="">All EM/PMs</option>${state.pms.map(p=>`<option ${filters.pm===p?'selected':''}>${escapeHtml(p)}</option>`).join('')}</select>
        </div>
        <div class="tablewrap">
          <table>
            <thead><tr>
              ${archiveHeader('ba','BA')}${archiveHeader('pm','EM/PM')}${archiveHeader('project','Project')}${archiveHeader('task','Task')}${archiveHeader('hours','Hrs')}${archiveHeader('priority','Priority')}${archiveHeader('completedDate','Completed')}${archiveHeader('notes','Notes')}<th></th>
            </tr></thead>
            <tbody>
              ${rows.length ? rows.map(t => archiveRowHtml(t)).join('') : `<tr><td colspan="9" class="empty">No completed requests yet.</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    `;

    document.getElementById('af-ba').onchange = e => { filters.ba = e.target.value; render(); };
    document.getElementById('af-pm').onchange = e => { filters.pm = e.target.value; render(); };
    root.querySelectorAll('th.sortable').forEach(th => th.onclick = () => {
      const key = th.dataset.key;
      if (sortState.key === key) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
      else { sortState.key = key; sortState.dir = 'asc'; }
      render();
    });
    root.querySelectorAll('[data-reopen]').forEach(b => b.onclick = () => reopenTask(Number(b.dataset.reopen)));
    root.querySelectorAll('[data-archdel]').forEach(b => b.onclick = () => deleteTask(Number(b.dataset.archdel)));
  }

  function archiveRowHtml(t){
    const baCell = t.ba === 'Unassigned' ? `<span class="unassigned-tag">Unassigned</span>` : escapeHtml(t.ba);
    return `<tr>
      <td>${baCell}</td>
      <td>${escapeHtml(t.pm)}</td>
      <td class="wrap">${escapeHtml(t.project)}</td>
      <td class="wrap">${escapeHtml(t.task)}</td>
      <td class="mono">${(t.hours===null||t.hours===''||t.hours===undefined)?'—':t.hours}</td>
      <td>${pillForPriority(t.priority)}</td>
      <td class="mono">${fmtDate(t.completedDate)}</td>
      <td class="wrap">${escapeHtml(t.notes)}</td>
      <td><button class="btn btn-ghost btn-sm" data-reopen="${t.id}">Reopen</button> <button class="btn btn-danger btn-sm" data-archdel="${t.id}">Del</button></td>
    </tr>`;
  }

  async function reopenTask(id){
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx === -1) return;
    const by = (await promptModal('Reopen request', 'Who is reopening this? (optional)', '')) || '(unspecified)';
    state.tasks[idx].status = 'In Progress';
    state.tasks[idx].completedDate = null;
    logActivity(id, state.tasks[idx].task, 'Reopened', by, '');
    if (!(await saveState())) return;
    showToast('Request reopened \u2014 back in Tracker.');
    render();
  }

  function newRequestApprovalCard(t){
    const baCell = t.ba === 'Unassigned' ? `<span class="unassigned-tag">Unassigned</span>` : escapeHtml(t.ba);
    return `<div class="approval-card">
      <div class="ac-top">
        <div class="ac-title">${escapeHtml(t.task)}</div>
        <div class="ac-meta">Requested by ${escapeHtml(t.pm)} on ${fmtDate(t.dateRequested)}</div>
      </div>
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:4px;">${escapeHtml(t.project)}</div>
      <table class="difftable">
        <tr><td>BA</td><td>${baCell}</td></tr>
        <tr><td>Priority</td><td>${pillForPriority(t.priority)}</td></tr>

        <button class="btn btn-primary btn-sm" data-approve-new="${t.id}">Approve</button>
        <button class="btn btn-danger btn-sm" data-reject-new="${t.id}">Reject</button>
      </div>
    </div>`;
  }

  function editApprovalCard(t){
    const pc = t.pendingChange;
    const rows = GATED_FIELDS.filter(f => pc[f] !== undefined).map(f => {
      let oldVal = t[f], newVal = pc[f];
      if (f === 'priority') { oldVal = pillForPriority(oldVal); newVal = pillForPriority(newVal); }
      else if (f === 'targetStart' || f === 'estEnd') { oldVal = fmtDate(oldVal); newVal = fmtDate(newVal); }
      else if (f === 'ba') { oldVal = escapeHtml(oldVal); newVal = escapeHtml(newVal); }
      else { oldVal = escapeHtml(String(oldVal)); newVal = escapeHtml(String(newVal)); }
      return `<tr><td>${FIELD_LABELS[f]}</td><td><span class="diff-old">${oldVal}</span> \u2192 <span class="diff-new">${newVal}</span></td></tr>`;
    }).join('');
    return `<div class="approval-card">
      <div class="ac-top">
        <div class="ac-title">${escapeHtml(t.task)}</div>
        <div class="ac-meta">Requested by ${escapeHtml(pc.requestedBy)} on ${fmtDateTime(pc.requestedAt)}</div>
      </div>
      <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:4px;">${escapeHtml(t.ba)} \u2014 ${escapeHtml(t.project)}</div>
      <table class="difftable">${rows}</table>
      <div class="approval-actions">
        <label>Approved by</label>
        <input type="text" id="approver-edit-${t.id}" value="${escapeHtml(state.approverName)}"/>
        ${state.approvalCode ? `<label>Code</label><input type="password" id="code-edit-${t.id}" style="max-width:100px;"/>` : ''}
        <button class="btn btn-primary btn-sm" data-approve-edit="${t.id}">Approve</button>
        <button class="btn btn-danger btn-sm" data-reject-edit="${t.id}">Reject</button>
      </div>
    </div>`;
  }

  async function approveNewRequest(id){
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx === -1) return;
    if (state.approvalCode) {
      const enteredCode = (document.getElementById(`code-new-${id}`)||{}).value || '';
      if (enteredCode !== state.approvalCode) {
        showToast('Incorrect approval code \u2014 not approved.');
        return;
      }
    }
    const by = (document.getElementById(`approver-new-${id}`)||{}).value || state.approverName;
    state.tasks[idx].awaitingApproval = false;
    state.tasks[idx].lastApproval = { by, at: new Date().toISOString(), action: 'approved-new' };
    logActivity(id, state.tasks[idx].task, 'Approved new request', by, '');
    if (!(await saveState())) return;
    showToast('Request approved \u2014 now live in Tracker.');
    render();
  }

  async function rejectNewRequest(id){
    if (!(await confirmModal('Reject and delete this request? This cannot be undone.', 'Reject'))) return;
    const by = (await promptModal('Reject request', 'Who is rejecting this? (optional)', state.approverName)) || state.approverName;
    const task = state.tasks.find(t => t.id === id);
    state.tasks = state.tasks.filter(t => t.id !== id);
    logActivity(id, task ? task.task : '(unknown)', 'Rejected new request', by, '');
    if (!(await saveState())) return;
    showToast('Request rejected.');
    render();
  }

  async function approveEdit(id){
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx === -1) return;
    if (state.approvalCode) {
      const enteredCode = (document.getElementById(`code-edit-${id}`)||{}).value || '';
      if (enteredCode !== state.approvalCode) {
        showToast('Incorrect approval code \u2014 not approved.');
        return;
      }
    }
    const by = (document.getElementById(`approver-edit-${id}`)||{}).value || state.approverName;
    const pc = state.tasks[idx].pendingChange;
    const detail = GATED_FIELDS.filter(f => pc[f] !== undefined).map(f => `${FIELD_LABELS[f]} \u2192 ${pc[f]}`).join('; ');
    GATED_FIELDS.forEach(f => { if (pc[f] !== undefined) state.tasks[idx][f] = pc[f]; });
    state.tasks[idx].pendingChange = null;
    state.tasks[idx].lastApproval = { by, at: new Date().toISOString(), action: 'approved-edit' };
    logActivity(id, state.tasks[idx].task, 'Approved edit', by, detail);
    if (!(await saveState())) return;
    showToast('Change approved and applied.');
    render();
  }

  async function rejectEdit(id){
    if (!(await confirmModal('Discard this proposed change and keep the current values?', 'Discard'))) return;
    const by = (await promptModal('Reject change', 'Who is rejecting this? (optional)', state.approverName)) || state.approverName;
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx === -1) return;
    logActivity(id, state.tasks[idx].task, 'Rejected edit', by, '');
    state.tasks[idx].pendingChange = null;
    if (!(await saveState())) return;
    showToast('Change rejected \u2014 original values kept.');
    render();
  }

  async function deleteTask(id){
    if (!(await confirmModal('Remove this request? This cannot be undone.', 'Remove'))) return;
    const task = state.tasks.find(t => t.id === id);
    const by = (await promptModal('Delete request', 'Who is deleting this? (optional)', '')) || '(unspecified)';
    state.tasks = state.tasks.filter(t => t.id !== id);
    logActivity(id, task ? task.task : '(unknown)', 'Deleted', by, '');
    if (!(await saveState())) return;
    showToast('Request removed.');
    render();
  }

  function renderAvailability(){
    const { enriched, windowStart, windowEnd, today } = computeDerived();
    const avail = computeBAAvailability(enriched, windowStart, windowEnd, today);
    avail.forEach(a => {
      a.dailyLoad = computeDailyLoad(enriched, windowStart, windowEnd, a.name, a.weeklyCapacity / 5);
    });
    const waitingUnassigned = enriched.filter(t=>t.active && t.ba==='Unassigned');
    const waitingHours = waitingUnassigned.reduce((s,t)=>s+(Number(t.hours)||0),0);

    root.innerHTML = `
      <div class="pagehead">
        <h1>BA Availability</h1>
        <p>Committed hours vs. 2-week capacity for each BA, capped by working days actually left in this sprint, plus a day-by-day view showing which specific days are choked even when the sprint total looks fine.</p>
      </div>
      <div class="statrow">
        <div class="statcard"><div class="n mono">${waitingUnassigned.length}</div><div class="l">Unassigned requests waiting</div></div>
        <div class="statcard"><div class="n mono">${waitingHours}</div><div class="l">Unassigned hours waiting</div></div>
        <div class="statcard"><div class="n mono">${avail.filter(a=>a.status==='Available').length}</div><div class="l">BAs with headroom</div></div>
        <div class="statcard"><div class="n mono">${avail.filter(a=>a.status!=='Available').length}</div><div class="l">BAs without headroom</div></div>
      </div>
      <div class="card">
        <div class="legend-key">
          <span><i style="background:var(--teal)"></i>Committed hours</span>
          <span><i style="background:var(--red)"></i>Over capacity marker</span>
          <span><i style="background:var(--green-soft)"></i>Day: light load</span>
          <span><i style="background:var(--amber-soft)"></i>Day: near capacity</span>
          <span><i style="background:var(--red-soft)"></i>Day: choked</span>
        </div>
        <div style="margin-top:14px;">
          ${avail.map(a => baCardHtml(a)).join('')}
        </div>
      </div>
    `;
  }

  function dailyLoadStripHtml(dailyLoad){
    if (!dailyLoad || !dailyLoad.length) return '';
    const cells = dailyLoad.map(d => {
      const dt = new Date(d.date + 'T00:00:00');
      const dow = dt.toLocaleDateString('en-GB', { weekday: 'short' }).slice(0,2);
      const dnum = dt.getDate();
      const pct = Math.max(0, Math.min(d.pct, 1.5));
      const heightPct = Math.min(pct, 1) * 100;
      let barColor = 'var(--teal)', cellBg = 'transparent';
      if (d.pct > 1) { barColor = 'var(--red)'; }
      else if (d.pct >= 0.75) { barColor = 'var(--amber)'; }
      else { barColor = 'var(--teal)'; }
      const overTag = d.pct > 1 ? ' \u26a0' : '';
      return `<div class="daily-load-cell" title="${dow} ${fmtDate(d.date)}: ${d.load} hrs load${overTag}">
        <div class="bar"><div class="bar-fill" style="height:${Math.max(heightPct,4)}%; background:${barColor};"></div></div>
        <div class="lbl">${dow}${dnum}</div>
      </div>`;
    }).join('');
    return `
      <div class="daily-load-heading"><span class="lbl">Daily load this sprint</span></div>
      <div class="daily-load-strip">${cells}</div>
    `;
  }

  function baCardHtml(a){
    const pct = a.cap2w > 0 ? Math.min(a.util, 1.3) : 0;
    const fillPct = Math.min(pct, 1) * 100;
    const overflow = a.util > 1;
    const statusCls = a.status === 'Available' ? 'pill-yes' : (a.status === 'Sprint ending' ? 'pill-atrisk' : 'pill-no');
    const nextUpHtml = a.nextUp
      ? `<div class="bacard-nextup"><span class="lbl">Next up (pick-up order 1)</span>${escapeHtml(a.nextUp.task)} <span class="mono" style="color:var(--ink-soft);">— ${a.nextUp.hours} hrs, ${a.nextUp.priority}, due ${fmtDate(a.nextUp.estEnd)}</span></div>`
      : `<div class="bacard-nextup"><span class="lbl">Next up</span>Nothing queued — fully clear.</div>`;
    const remainingLabel = a.realisticRemaining >= 0
      ? `${Math.round(a.realisticRemaining*10)/10} hrs realistically left this sprint`
      : `${Math.round(Math.abs(a.realisticRemaining)*10)/10} hrs over`;
    const budgetDiffers = Math.round(a.remaining*10) !== Math.round(a.realisticRemaining*10);
    const budgetNote = budgetDiffers
      ? ` <span style="color:var(--ink-faint);" title="Total budget left if no more calendar time existed this sprint, before accounting for how many working days are actually left">(${a.remaining} hrs budget)</span>`
      : '';
    const usedBreakdown = a.completedHours > 0
      ? `${a.committed} hrs still open + ${a.completedHours} hrs completed this sprint`
      : `${a.committed} hrs open`;
    const chokedDays = (a.dailyLoad || []).filter(d => d.pct > 1).length;
    const chokedNote = chokedDays > 0
      ? ` <span class="pill pill-atrisk" title="These specific days have more work landing on them than the daily capacity allows, even though the sprint total may look fine">${chokedDays} day${chokedDays===1?'':'s'} choked</span>`
      : '';
    return `
      <div class="bacard">
        <div class="bacard-top">
          <div class="bacard-name">${escapeHtml(a.name)}${chokedNote}</div>
          <span class="pill ${statusCls}">${a.status}</span>
        </div>
        <div class="capacitybar-wrap">
          <div class="capacitybar">
            <div class="fill" style="width:${fillPct}%; background:${overflow ? 'var(--red)' : 'var(--teal)'};"></div>
            ${overflow ? '<div class="overmark"></div>' : ''}
          </div>
          <div class="capline">
            <span title="${usedBreakdown}">${a.totalUsed} / ${a.cap2w} hrs used this sprint (${Math.round(a.util*100)}%)</span>
            <span>${remainingLabel}${budgetNote}</span>
          </div>
          <div class="capline" style="margin-top:2px;">
            <span style="color:var(--ink-faint);">${usedBreakdown} · ${a.daysLeft} working day${a.daysLeft===1?'':'s'} left</span>
          </div>
          ${dailyLoadStripHtml(a.dailyLoad)}
          <div class="capline" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
            <span style="color:var(--ink-soft);" title="Total hours of everything still open and not completed for this BA, converted to man-days using their weekly capacity - not limited to this sprint, so this reflects their true backlog size regardless of task dates">${Math.round(a.manDaysOpen*10)/10} man-days of open work</span>
            <span style="color:var(--ink-faint);">${a.totalOpenHoursAllTime} total open hrs</span>
          </div>
        </div>
        ${nextUpHtml}
      </div>
    `;
  }

  function renderDashboard(){
    const { enriched } = computeDerived();
    const open = enriched.filter(t => t.active);
    const baRows = [...state.bas.map(b=>b.name), 'Unassigned'].map(name => {
      const rows = open.filter(t => t.ba === name);
      const byPri = {P1:0,P2:0,P3:0,P4:0};
      rows.forEach(t => { if (byPri[t.priority] != null) byPri[t.priority] += t.inSprintHours; });
      const total = byPri.P1+byPri.P2+byPri.P3+byPri.P4;
      const risk = rows.filter(t=>t.status==='At Risk'||t.status==='Blocked').length;
      return { name, ...byPri, total, risk };
    }).filter(r => r.total > 0 || r.name !== 'Unassigned' ? true : false);

    const totals = baRows.reduce((acc,r)=>{ acc.P1+=r.P1; acc.P2+=r.P2; acc.P3+=r.P3; acc.P4+=r.P4; acc.total+=r.total; acc.risk+=r.risk; return acc; }, {P1:0,P2:0,P3:0,P4:0,total:0,risk:0});

    const pmRows = state.pms.map(pm => {
      const rows = open.filter(t => t.pm === pm);

      const unassigned = rows.filter(t=>t.ba==='Unassigned').length;
      const newReq = rows.filter(t=>t.status==='New Request').length;
      return { pm, count: rows.length, hours, unassigned, newReq };
    }).filter(r => r.count > 0);

    const maxBar = Math.max(1, ...baRows.map(r=>r.total));

    root.innerHTML = `
      <div class="pagehead">

        <p>Open workload across all BAs and all 13 EM/PMs, at a glance.</p>

                <td>${r.name === 'Unassigned' ? '<span class="unassigned-tag">Unassigned</span>' : escapeHtml(r.name)}</td>

                <td class="mono">${r.P1||''}</td><td class="mono">${r.P2||''}</td><td class="mono">${r.P3||''}</td><td class="mono">${r.P4||''}</td>
                <td class="mono" style="font-weight:600;">${r.total}</td>
                <td class="mono">${r.risk||''}</td>
              </tr>`).join('')}
              <tr style="background:var(--surface-alt);font-weight:600;">
                <td>TOTAL</td><td></td>
                <td class="mono">${totals.P1}</td><td class="mono">${totals.P2}</td><td class="mono">${totals.P3}</td><td class="mono">${totals.P4}</td>
                <td class="mono">${totals.total}</td><td class="mono">${totals.risk}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <h2>Open requests by EM/PM</h2>
        <div class="tablewrap">
          <table>
            <thead><tr><th>EM/PM</th><th>Open requests</th><th>Open hours</th><th>Unassigned</th><th>New requests</th></tr></thead>
            <tbody>
              ${pmRows.length ? pmRows.map(r => `<tr>
                <td>${escapeHtml(r.pm)}</td><td class="mono">${r.count}</td><td class="mono">${r.hours}</td>
                <td class="mono">${r.unassigned||''}</td><td class="mono">${r.newReq||''}</td>
              </tr>`).join('') : `<tr><td colspan="5" class="empty">No open requests yet.</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  function barHtml(r, maxBar){
    const segs = ['P1','P2','P3','P4'];
    const colors = { P1:'var(--red)', P2:'var(--amber)', P3:'var(--teal)', P4:'var(--ink-faint)' };
    const widthPct = (v) => (maxBar > 0 ? (v/maxBar*100) : 0);
    return `<div style="display:flex;height:9px;border-radius:5px;overflow:hidden;background:var(--surface-alt);width:100%;">
      ${segs.map(s => r[s] ? `<div style="width:${widthPct(r[s])}%;background:${colors[s]};" title="${s}: ${r[s]}h"></div>` : '').join('')}
    </div>`;
  }

  // ---- Activity Log ----
  function renderActivityLog(){
    const log = state.activityLog || [];
    const filters = window.__logFilters || { by:'', action:'' };
    window.__logFilters = filters;
    if (!window.__logSort) window.__logSort = { key: 'at', dir: 'desc' };

    let rows = log.slice();
    if (filters.by) rows = rows.filter(r => r.by === filters.by);
    if (filters.action) rows = rows.filter(r => r.action === filters.action);

    const sortState = window.__logSort;
    const dir = sortState.dir === 'asc' ? 1 : -1;
    rows.sort((a,b) => {
      let va = a[sortState.key], vb = b[sortState.key];
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      return String(va).localeCompare(String(vb)) * dir;
    });

    const byOptions = Array.from(new Set(log.map(r => r.by))).sort();
    const actionOptions = Array.from(new Set(log.map(r => r.action))).sort();

    function logHeader(key, label){
      const active = sortState.key === key;
      const arrow = active ? (sortState.dir==='asc'?'\u25b2':'\u25bc') : '\u2195';
      return `<th class="sortable${active?' sort-active':''}" data-key="${key}">${label}<span class="sort-arrow">${arrow}</span></th>`;
    }

    root.innerHTML = `
      <div class="pagehead">
        <h1>Activity Log</h1>
        <p>Every request created, edited, deleted, reopened, approved, or rejected \u2014 who did it and when. Kept to the most recent 300 actions.</p>
      </div>
      <div class="statrow">
        <div class="statcard"><div class="n mono">${log.length}</div><div class="l">Logged actions</div></div>
      </div>
      <div class="card">
        <div class="filters">
          <select id="lf-by"><option value="">All people</option>${byOptions.map(b=>`<option ${filters.by===b?'selected':''}>${escapeHtml(b)}</option>`).join('')}</select>
          <select id="lf-action"><option value="">All action types</option>${actionOptions.map(a=>`<option ${filters.action===a?'selected':''}>${escapeHtml(a)}</option>`).join('')}</select>
        </div>
        <div class="tablewrap">
          <table>
            <thead><tr>
              ${logHeader('at','When')}${logHeader('task','Task')}${logHeader('action','Action')}${logHeader('by','By')}${logHeader('detail','Detail')}
            </tr></thead>
            <tbody>
              ${rows.length ? rows.map(r => `<tr>
                <td class="mono">${fmtDateTime(r.at)}</td>
                <td class="wrap">${escapeHtml(r.task)}</td>
                <td>${escapeHtml(r.action)}</td>
                <td>${escapeHtml(r.by)}</td>
                <td class="wrap" style="font-size:11.5px;color:var(--ink-soft);">${escapeHtml(r.detail)}</td>
              </tr>`).join('') : `<tr><td colspan="5" class="empty">No activity logged yet.</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    `;

    document.getElementById('lf-by').onchange = e => { filters.by = e.target.value; render(); };
    document.getElementById('lf-action').onchange = e => { filters.action = e.target.value; render(); };
    root.querySelectorAll('th.sortable').forEach(th => th.onclick = () => {
      const key = th.dataset.key;
      if (sortState.key === key) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
      else { sortState.key = key; sortState.dir = 'asc'; }
      render();
    });
  }

      pmList.appendChild(row);

  function renderReadme(){
    root.innerHTML = `
      <div class="pagehead">
        <h1>Read Me</h1>
        <p>How this board works, for EM/PMs and BAs.</p>
      </div>
      <div class="card">
        <div class="readme-section">
          <h3>Purpose</h3>
          <p>One shared place for 13 EM/PMs to log Business Analyst work requests, and for both EM/PMs and BAs to see what's committed over the next two weeks, its priority, how much spare capacity each BA has, and — since requests come from many different EM/PMs — a clear, fair order of what to pick up first.</p>

          <h3>For EM/PMs</h3>
          <ol>
