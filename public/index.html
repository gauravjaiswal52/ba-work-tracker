            <li>Update Request Status as work moves (In Progress / Blocked / At Risk / Completed).</li>
            <li>Setting status to <b>Completed</b> moves the request out of Tracker and into the <b>Archive</b> tab automatically \u2014 it stops counting against your capacity right away.</li>
            <li>Flag anything Blocked or At Risk in Notes so EM/PMs can see it immediately.</li>
          </ol>
        </div>
        <div class="readme-section">
          <h3>Bulk-adding requests with CSV</h3>
          <p>On Tracker, click <b>Download CSV template</b> to get the right column headers, fill in one row per request, then click <b>Upload CSV</b> to import them all at once. Any new EM/PM or BA name in the file is added to the lists automatically. Rows missing a task description are skipped and listed in a summary after import.</p>
        </div>
        <div class="readme-section">
          <h3>Blank Priority, dates, or Hours stay blank</h3>
          <p>Nothing is auto-filled. If a CSV row or a manually added request leaves Priority, Target Start, Est. End, or Hours empty, it stays empty \u2014 it does not get defaulted to today's date, a made-up priority, or 0 hours.</p>
          <p>A request missing any of those fields is still fully visible in Tracker, marked with an <b>Incomplete</b> tag, but it's skipped from pick-up order, cumulative hours, and BA capacity/committed-hours totals until someone fills in the missing pieces. This keeps sequencing accurate \u2014 a task can't be ranked against real priorities and deadlines if it doesn't have any yet.</p>
          <p style="color:var(--ink-soft);font-size:11.5px;">Filling in a blank Priority, date, or Hours value is itself an edit to a gated field, so \u2014 like any other change to those fields \u2014 it only applies immediately on Friday\u2013Sunday, or when made by the approver; otherwise it waits in Approvals like any other edit.</p>
        </div>
        <div class="readme-section">
          <h3>Project EDD (optional)</h3>
          <p>Each request can carry an optional <b>Project EDD</b> (the overall project's expected delivery date) \u2014 separate from the task's own Target Start / Est. End. It's purely informational: it never affects Pick-up Order, capacity, "Fits now?", or the Incomplete flag, and it's never gated by the Friday\u2013Sunday approval rule. Leave it blank if you don't have one.</p>
        </div>
        <div class="readme-section">
          <h3>Filtering the Tracker</h3>
          <p>Beyond BA, EM/PM, Priority, and Status, Tracker has five more filters: <b>"In this sprint / Outside this sprint"</b> shows only tasks whose dates overlap the current Monday\u2013Friday sprint window, or only the ones that don't; a <b>Start\u2013End overlap</b> range filter (From / To) shows tasks whose Target Start\u2013Est. End overlaps any custom range you pick; an <b>Est. End Date</b> range filter (From / To) shows tasks whose end date specifically falls within a range \u2014 useful for finding everything due by a certain point, regardless of when it started; a <b>Project EDD</b> range filter (From / To) does the same for that optional date; and <b>"Incomplete only / Complete only"</b> isolates tasks missing Priority, dates, or Hours so you can quickly find and finish setting them up. Tasks with no dates yet always stay visible through any date filter, since there's nothing to range-check.</p>

        <div class="readme-section">
          <h3>Sorting and archive</h3>
          <p>Click any column header on Tracker or Archive to sort by that column; click again to reverse the order. Completed requests never clutter Tracker \u2014 they live in <b>Archive</b>, where you can still filter, sort, reopen a request if it was closed by mistake, or delete it permanently.</p>
        </div>
        <div class="readme-section">
          <h3>Friday–Sunday planning window &amp; approvals</h3>
          <p><b>Friday, Saturday, and Sunday are the open planning window.</b> New requests and any change to Priority, Target Start, Est. End, Hours, or the assigned BA go live immediately if made on any of those three days.</p>
          <p>On any other day, those same changes are held as <b>pending</b> instead of taking effect \u2014 they don't count toward a BA's capacity or pick-up order until approved. Status updates and notes are never gated and can be edited any day, so BAs can always log real progress.</p>
          <p>Right now, <b>${state.approverName}</b> is the designated approver (set on the Manage EM/PMs &amp; BAs tab). Pending items show up on the <b>Approvals</b> tab with an "Approved by" field, Approve, and Reject actions. If ${state.approverName} is the one submitting a request or edit, or a change is made Friday through Sunday, it skips the approval queue entirely.</p>
          <p>An optional <b>approval code</b> can be set on the Manage EM/PMs &amp; BAs tab. If one is set, a Code field appears on every Approve action, and the click is blocked with an "Incorrect approval code" message unless the right code is entered \u2014 Reject doesn't need it, since rejecting only discards a request rather than granting anything. Leave the code blank to turn this off entirely.</p>
          <p style="color:var(--ink-soft);font-size:11.5px;">Note: this link has no logins, so both the approver identity and the approval code are honor-system controls, not enforced access restriction \u2014 anyone with the link could technically view the code in the page's data with enough technical effort. Treat it as a deterrent against casual clicks, not real security. The EM/PM field on each submission is self-declared too.</p>
        </div>
        <div class="readme-section">
          <h3>Activity Log</h3>
          <p>The <b>Activity Log</b> tab records every request created, edited, deleted, reopened, approved, or rejected \u2014 who did it, when, and what changed. Filter by person or action type, and click any column to sort. It keeps the most recent 300 actions.</p>
          <p>Changing a task's <b>Status</b> (In Progress, Blocked, At Risk, Completed, etc.) asks "Who is changing status to...?" and logs it as its own separate "Status changed" entry \u2014 since this is often a BA updating their own progress rather than the EM/PM on the request, it's tracked apart from other field edits. This prompt is optional: skip or cancel it and the status change still goes through, it just falls back to logging the request's EM/PM as the "who."</p>
          <p style="color:var(--ink-soft);font-size:11.5px;">"Who" is self-declared throughout: the EM/PM you select when adding/editing a request is what gets logged for other field changes, and the name typed into the status-change prompt (or the EM/PM as a fallback) for status changes. Deleting, reopening, and rejecting don't ask for a name (to keep those quick, single-click actions) and log as "(unspecified)" or the approver's name \u2014 there's no login to verify identity either way, so treat this as a helpful record, not a tamper-proof audit trail.</p>
        </div>
        <div class="readme-section">
          <h3>If you see "Someone else saved changes..."</h3>
          <p>This tool is shared live by everyone on the team, so it's possible for two people to be editing at the same moment. If your save shows this message, it means someone else's change reached the shared data a moment before yours \u2014 rather than silently overwriting their work, your save is stopped and the page reloads the latest data automatically. If you were in the Add/Edit form, it stays open with everything you typed still there \u2014 just click <b>Save</b> again and it will go through. Nothing you typed is lost, and nobody else's work gets erased either.</p>
        </div>
        <div class="readme-section">
          <h3>How the pick-up order is decided</h3>
          <p>Every open task assigned to a BA is ranked using, in order:</p>
          <ol>
            <li><b>Priority</b> — P1 beats P2 beats P3 beats P4, same scale for every EM/PM.</li>
            <li><b>Est. End Date</b> — within the same priority, whichever is due soonest (or most overdue) goes first.</li>
            <li><b>Date requested</b> — if still tied, first-come-first-served.</li>
          </ol>
          <p>"Cumulative hours" adds up Est. Man-Hours in that order, so you can see exactly where the line falls between "fits now" and "queued" given the BA's 2-week capacity.</p>
        </div>
        <div class="readme-section">
          <h3>How BA Availability's "hrs used this sprint" works</h3>
          <p>Completing a task does <b>not</b> free up hours for the rest of the sprint. Each BA's "hrs used this sprint" is the sum of hours still open <i>plus</i> hours already completed this sprint \u2014 so marking a task Completed just moves its hours from "still open" to "completed," without changing the total. The breakdown line under the bar (e.g., "28 hrs still open + 6 hrs completed this sprint") always shows both pieces, so it's clear where the hours sit without the top-line number ever jumping around.</p>
          <p>"Hrs realistically left this sprint" takes that stable total and additionally caps it by how many working days are actually left in the current Monday\u2013Friday window \u2014 it will never show more than what a BA could physically get through in the days remaining. If the uncapped budget figure differs from this (i.e., the sprint is nearly over), it's shown alongside in parentheses for context. Together, these two changes mean the numbers only move when something genuinely changes a BA's future workload \u2014 a new request, a priority change, or the sprint rolling over \u2014 never just because a task got marked done.</p>
          <p>If a task's Target Start falls within this sprint but its Est. End extends beyond it (a multi-sprint task), only the portion of its hours that overlaps <i>this</i> sprint counts toward this sprint's capacity \u2014 not the full total. On Tracker, the Hrs column shows a small note like "100 (40 this sprint)" whenever this applies, so it's clear the full estimate and the sprint-scoped share are different numbers on purpose.</p>
        </div>
        <div class="readme-section">
          <h3>Daily load \u2014 spotting choked days within an otherwise fine sprint</h3>
          <p>A BA can look fine on the sprint-wide total while still having a few specific days where far too much lands at once \u2014 e.g., five short tasks that all happen to start and end in the same couple of days. The <b>"Daily load this sprint"</b> strip on each BA's card breaks the sprint into its individual working days and shows how much work is spread across each one: every task's hours are divided evenly across its own date range, then summed per day. Green bars mean a light day, amber means a day is nearing that BA's daily capacity, and red (with a small warning mark) means more is landing on that day than they can realistically get through \u2014 hover any bar for the exact date and hours. If any days are flagged, a <b>"X days choked"</b> tag appears next to the BA's name, even when their overall status still says "Available."</p>
        </div>
        <div class="readme-section">

          ${pillForPriority('P4')} Low — can slip if needed</p>

        <div class="readme-section">
          <h3>Status legend</h3>
          <p>${pillForStatus('New Request')} submitted, not yet actioned &nbsp; ${pillForStatus('Queued')} accepted, waiting for capacity<br/>
          ${pillForStatus('In Progress')} &nbsp; ${pillForStatus('At Risk')} &nbsp; ${pillForStatus('Blocked')} &nbsp; ${pillForStatus('Completed')}</p>
        </div>
      </div>
    `;
  }

  navBtns.forEach(btn => btn.onclick = () => {
    activeTab = btn.dataset.tab;
    navBtns.forEach(b => b.classList.toggle('active', b === btn));
    render();
  });

  function updateSprintBadge(){
    const badge = document.getElementById('sprint-badge');
    if (!badge) return;
    const { start, end, sprintNumber } = getPlanningWindow();
    badge.innerHTML = `<div class="sprint-title"><span class="dot"></span>Sprint ${sprintNumber} (Ongoing)</div><div class="sprint-dates">${fmtDate(start)} \u2013 ${fmtDate(end)}</div>`;
  }

  (async function init(){
    root.innerHTML = '<div class="loading-row">Loading shared board…</div>';
    await loadState();
    updateSprintBadge();
    render();
  })();
})();
</script>
</body></html>
